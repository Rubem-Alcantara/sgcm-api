# 1. ConexŃo com o Banco de Dados (Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/sgcm_db
spring.datasource.username=ads_user
spring.datasource.password=ads_password
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Configurań§es do Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. Configurań§es de Seguranńa JWT
api.security.token.secret=${JWT_SECRET:minha-chave-secreta-super-dificil-123}